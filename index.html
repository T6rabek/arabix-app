/* ============================================================
   Qur'oniy Arabcha — mobile-first interactive app
   Design language: Timurid/Samarkand manuscript illumination —
   lapis ink, gilt gold, rubricated red, parchment ground.
   ============================================================ */

:root{
  --ink:#1b2430;
  --paper:#f6f1e3;
  --surface:#fffdf6;
  --surface-2:#efe8d4;
  --accent:#24507a;
  --accent-soft:#e4edf4;
  --accent-strong:#173a5c;
  --gold:#9c7128;
  --gold-soft:#f3e8d2;
  --rubric:#8a3230;
  --rubric-soft:#f6e6e3;
  --jade:#2f6b50;
  --jade-soft:#e6f0ea;
  --rule:#d9cfb8;
  --shadow: 0 6px 20px -8px rgba(27,36,48,0.25);
  --radius: 14px;
  --font-display:'Bookman Display', 'Georgia', serif;
  --font-body:'Manuscript Body', 'Palatino Linotype', Georgia, serif;
  --font-ui:'Gothic UI', 'Century Gothic', sans-serif;
  --font-ar:'Naskh Quran', 'Noto Naskh Arabic', serif;
  color-scheme: light;
}

@media (prefers-color-scheme: dark){
  :root{
    --ink:#ece6d6;
    --paper:#11151b;
    --surface:#1a212b;
    --surface-2:#212a36;
    --accent:#82b3da;
    --accent-soft:#1f3348;
    --accent-strong:#a9cbe8;
    --gold:#d9ac5c;
    --gold-soft:#2f2410;
    --rubric:#e08a80;
    --rubric-soft:#3a1f1d;
    --jade:#74c4a0;
    --jade-soft:#15281f;
    --rule:#313a48;
    --shadow: 0 6px 24px -8px rgba(0,0,0,0.6);
    color-scheme: dark;
  }
}
:root[data-theme="dark"]{
  --ink:#ece6d6; --paper:#11151b; --surface:#1a212b; --surface-2:#212a36;
  --accent:#82b3da; --accent-soft:#1f3348; --accent-strong:#a9cbe8;
  --gold:#d9ac5c; --gold-soft:#2f2410; --rubric:#e08a80; --rubric-soft:#3a1f1d;
  --jade:#74c4a0; --jade-soft:#15281f; --rule:#313a48;
  --shadow: 0 6px 24px -8px rgba(0,0,0,0.6); color-scheme: dark;
}
:root[data-theme="light"]{
  --ink:#1b2430; --paper:#f6f1e3; --surface:#fffdf6; --surface-2:#efe8d4;
  --accent:#24507a; --accent-soft:#e4edf4; --accent-strong:#173a5c;
  --gold:#9c7128; --gold-soft:#f3e8d2; --rubric:#8a3230; --rubric-soft:#f6e6e3;
  --jade:#2f6b50; --jade-soft:#e6f0ea; --rule:#d9cfb8;
  --shadow: 0 6px 20px -8px rgba(27,36,48,0.25); color-scheme: light;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
h1,h2,h3{font-family:var(--font-display);text-wrap:balance;margin:0;}
.ar,[dir="rtl"]{font-family:var(--font-ar);direction:rtl;unicode-bidi:isolate;}
button{font-family:var(--font-ui);}
:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}

/* ---------- App shell ---------- */
#app{
  max-width:560px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
}
.topbar{
  position:sticky; top:0; z-index:20;
  display:flex; align-items:center; gap:10px;
  padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;
  background:var(--paper);
  border-bottom:1px solid var(--rule);
}
.topbar .back-btn{
  background:none;border:none;color:var(--accent);
  font-size:1.5rem; line-height:1; padding:4px 6px; cursor:pointer;
  border-radius:8px;
}
.topbar .back-btn:active{background:var(--accent-soft);}
.topbar h1{font-size:1.05rem;color:var(--ink);flex:1;}
.topbar .eyebrow{
  font-family:var(--font-ui); font-size:.68rem; letter-spacing:.08em;
  text-transform:uppercase; color:var(--gold); display:block; margin-bottom:1px;
}
.theme-toggle{
  background:var(--surface-2); border:1px solid var(--rule); border-radius:20px;
  width:36px;height:36px; display:flex;align-items:center;justify-content:center;
  cursor:pointer; color:var(--ink); font-size:1rem;
}

main{flex:1; padding-bottom:88px;}

/* ---------- Bottom nav ---------- */
.tabbar{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:560px;
  display:flex; justify-content:space-around;
  background:var(--surface); border-top:1px solid var(--rule);
  padding:8px 8px calc(env(safe-area-inset-bottom,0px) + 8px);
  z-index:20;
}
.tab{
  background:none;border:none; display:flex; flex-direction:column; align-items:center;
  gap:3px; color:var(--ink); opacity:.55; font-family:var(--font-ui);
  font-size:.66rem; letter-spacing:.02em; padding:4px 10px; cursor:pointer;
  border-radius:10px;
}
.tab .ic{font-size:1.25rem;}
.tab.active{opacity:1; color:var(--accent);}

/* ---------- Home: hero + unit list ---------- */
.hero{
  padding:22px 20px 18px;
  background:
    radial-gradient(120% 100% at 100% 0%, var(--gold-soft), transparent 60%),
    linear-gradient(180deg, var(--accent-soft), var(--paper) 90%);
  border-bottom:1px solid var(--rule);
}
.hero .kicker{
  font-family:var(--font-ui); font-size:.72rem; letter-spacing:.12em;
  text-transform:uppercase; color:var(--accent); margin-bottom:8px; display:block;
}
.hero h1{font-size:1.7rem; color:var(--ink); line-height:1.15;}
.hero .ar-line{font-family:var(--font-ar); direction:rtl; color:var(--gold); font-size:1.3rem; margin-top:6px;}
.hero p{font-size:.92rem; color:var(--ink); opacity:.75; margin:10px 0 0; max-width:40ch;}

.progress-strip{
  display:flex; align-items:center; gap:10px; margin:16px 20px 4px;
  padding:12px 14px; background:var(--surface); border:1px solid var(--rule);
  border-radius:var(--radius); box-shadow:var(--shadow);
}
.progress-strip .ring{
  width:44px;height:44px; border-radius:50%; flex-shrink:0;
  background:conic-gradient(var(--jade) calc(var(--pct,0)*1%), var(--surface-2) 0);
  display:flex; align-items:center; justify-content:center;
}
.progress-strip .ring::after{
  content:""; width:32px;height:32px;border-radius:50%; background:var(--surface);
}
.progress-strip .ring-label{
  position:absolute; font-family:var(--font-ui); font-size:.62rem; font-weight:700;
}
.progress-strip .txt{font-family:var(--font-ui); font-size:.8rem; line-height:1.3;}
.progress-strip .txt b{font-family:var(--font-display); font-size:1rem; display:block; color:var(--ink);}

.phase-label{
  font-family:var(--font-ui); font-size:.72rem; letter-spacing:.1em; text-transform:uppercase;
  color:var(--gold); margin:22px 20px 8px; display:flex; align-items:center; gap:8px;
}
.phase-label .sub{color:var(--ink); opacity:.5; text-transform:none; letter-spacing:0; font-size:.72rem;}

.unit-list{padding:0 14px; display:flex; flex-direction:column; gap:8px;}
.unit-row{
  display:flex; align-items:center; gap:12px;
  background:var(--surface); border:1px solid var(--rule); border-radius:var(--radius);
  padding:11px 14px; cursor:pointer; text-align:left; width:100%;
}
.unit-row:active{background:var(--surface-2);}
.unit-row .num{
  width:34px;height:34px;border-radius:50%; flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-ui); font-weight:700; font-size:.85rem;
  background:var(--accent-soft); color:var(--accent);
}
.unit-row.done .num{background:var(--jade); color:#fff;}
.unit-row .meta{flex:1; min-width:0;}
.unit-row .meta .t{font-family:var(--font-display); font-size:.98rem; color:var(--ink); display:block;}
.unit-row .meta .s{font-family:var(--font-ar); direction:rtl; font-size:.85rem; color:var(--gold); display:block; margin-top:1px;}
.unit-row .chev{color:var(--ink); opacity:.3; font-size:1.1rem;}
.unit-row.done .chev::after{content:"✓"; color:var(--jade); opacity:1; font-family:var(--font-ui);}

/* ---------- Unit reader ---------- */
.folio{padding:18px 18px 28px;}
.unit-hero{margin-bottom:18px;}
.unit-hero .badge{
  display:inline-block; background:var(--accent); color:#fff; font-family:var(--font-ui);
  font-weight:700; font-size:.78rem; padding:3px 10px; border-radius:20px; margin-bottom:8px;
}
.unit-hero h1{font-size:1.5rem; color:var(--ink);}
.unit-hero .ar{font-size:1.2rem; color:var(--gold); margin-top:5px; display:block;}

.section-label{
  display:flex; align-items:center; gap:8px; margin:22px 0 8px;
  font-family:var(--font-ui); font-weight:700; font-size:.72rem; letter-spacing:.08em;
  text-transform:uppercase; color:var(--accent);
}
.section-label .dot{
  width:22px;height:22px;border-radius:50%; background:var(--accent-soft); color:var(--accent);
  display:flex;align-items:center;justify-content:center; font-size:.7rem; flex-shrink:0;
}
.prose{font-size:.98rem; line-height:1.65;}
.prose p{margin:0 0 10px;}
.prose .w{font-family:var(--font-ar); direction:rtl; unicode-bidi:isolate; color:var(--accent-strong); font-weight:700;}

.surah-card{
  background:linear-gradient(180deg, var(--gold-soft), var(--surface));
  border:1px solid var(--rule); border-radius:var(--radius); padding:18px 16px;
  margin:8px 0 6px; box-shadow:var(--shadow);
}
.ayah{
  font-family:var(--font-ar); direction:rtl; text-align:right;
  font-size:1.45rem; line-height:2.2; margin:0 0 4px;
}
.ayah .n{
  font-family:var(--font-ar); font-size:.85rem; color:var(--gold);
  border:1px solid var(--gold); border-radius:50%; display:inline-flex;
  align-items:center; justify-content:center; width:24px;height:24px; margin:0 3px;
}

.wbw-block{margin:14px 0; padding-bottom:12px; border-bottom:1px dashed var(--rule);}
.wbw-block:last-child{border-bottom:none;}
.wbw-ref{font-family:var(--font-ui); font-weight:700; font-size:.72rem; color:var(--gold); text-transform:uppercase; letter-spacing:.05em;}
.wbw-ar{font-family:var(--font-ar); direction:rtl; font-size:1.25rem; margin:5px 0 6px; line-height:1.9;}
.wbw-meaning{font-style:italic; opacity:.85; margin:0 0 6px;}

.card{
  border-radius:var(--radius); padding:14px 15px; margin:12px 0;
  border-left:4px solid var(--c, var(--accent));
  background:var(--bg, var(--accent-soft));
}
.card .card-title{

.card.qoida{--c:var(--accent); --bg:var(--accent-soft);}
.card.tafakkur{--c:var(--gold); --bg:var(--gold-soft);}
.card.talaffuz{--c:var(--jade); --bg:var(--jade-soft);}
.card p{margin:0 0 8px; font-size:.94rem; line-height:1.6;}
.card p:last-child{margin-bottom:0;}
.review-chip{
  display:inline-block; background:#efe6f6; color:#6b3fa0; font-family:var(--font-ui);

}

/* ---------- Vocab ---------- */
.vocab-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0;}
.vocab-card{
  background:var(--surface); border:1px solid var(--rule); border-radius:10px;
  padding:10px; cursor:pointer; min-height:64px; position:relative; overflow:hidden;
}
.vocab-card .ar{font-size:1.15rem; color:var(--accent-strong);}
.vocab-card .uz{font-size:.78rem; opacity:0; max-height:0; transition:opacity .15s;}
.vocab-card.flipped .uz{opacity:1; max-height:40px; margin-top:4px;}
.vocab-card .tag{position:absolute; top:6px; right:8px; font-size:.6rem; font-family:var(--font-ui); font-weight:700;}
.vocab-card.core .tag{color:var(--rubric);}
.vocab-card.rec .tag{color:var(--ink); opacity:.4;}

/* ---------- Exercises ---------- */
.ex-card{
  background:var(--surface); border:1px solid var(--rule); border-radius:var(--radius);
  padding:14px 15px; margin:12px 0;
}
.ex-kicker{font-family:var(--font-ui); font-size:.68rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ink); opacity:.5; margin-bottom:6px;}
.ex-q{font-size:.96rem; margin-bottom:10px; line-height:1.55;}
.ex-q .ar{font-size:1.15rem;}
.ex-options{display:flex; flex-direction:column; gap:8px;}
.ex-opt{
  text-align:left; padding:10px 12px; border-radius:10px; border:1.5px solid var(--rule);

  display:flex; justify-content:space-between; align-items:center; gap:8px;
}
.ex-opt .ar{font-size:1.05rem;}
.ex-opt:active{background:var(--surface-2);}
.ex-opt.correct{background:var(--jade-soft); border-color:var(--jade); color:var(--jade);}
.ex-opt.wrong{background:var(--rubric-soft); border-color:var(--rubric); color:var(--rubric);}
.ex-opt.disabled{pointer-events:none; opacity:.55;}
.ex-opt.disabled.correct, .ex-opt.disabled.wrong{opacity:1;}
.ex-feedback{margin-top:8px; font-size:.85rem; padding:8px 10px; border-radius:8px;}
.ex-feedback.ok{background:var(--jade-soft); color:var(--jade);}
.ex-feedback.no{background:var(--rubric-soft); color:var(--rubric);}

.reveal-btn{
  background:var(--accent); color:#fff; border:none; border-radius:10px;
  padding:9px 16px; font-family:var(--font-ui); font-weight:700; font-size:.84rem; cursor:pointer;
}
.reveal-answer{
  margin-top:10px; padding:10px 12px; background:var(--gold-soft); border-radius:10px;
  font-size:.92rem; line-height:1.5;
}
.self-check{display:flex; gap:8px; margin-top:10px;}
.self-check button{
  flex:1; border-radius:10px; padding:8px; font-family:var(--font-ui); font-weight:700;
  font-size:.8rem; border:1.5px solid var(--rule); background:var(--paper); cursor:pointer;
}
.self-check button.got.picked{background:var(--jade-soft); border-color:var(--jade); color:var(--jade);}
.self-check button.miss.picked{background:var(--rubric-soft); border-color:var(--rubric); color:var(--rubric);}

.match-row{display:flex; gap:10px; margin:10px 0;}
.match-col{flex:1; display:flex; flex-direction:column; gap:7px;}
.match-item{
  padding:9px 10px; border-radius:9px; border:1.5px solid var(--rule); background:var(--paper);
  font-size:.86rem; cursor:pointer; text-align:center;
}
.match-item.sel{border-color:var(--accent); background:var(--accent-soft);}
.match-item.matched{border-color:var(--jade); background:var(--jade-soft); color:var(--jade); pointer-events:none;}
.match-item.shake{border-color:var(--rubric); background:var(--rubric-soft); animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}

.unit-nav{display:flex; gap:10px; margin-top:22px;}
.unit-nav button{
  flex:1; padding:12px; border-radius:12px; border:1px solid var(--rule); background:var(--surface);
  font-family:var(--font-ui); font-weight:700; font-size:.82rem; color:var(--ink); cursor:pointer;
}
.unit-nav button.primary{background:var(--accent); color:#fff; border-color:var(--accent);}
.unit-nav button:disabled{opacity:.4;}

.milestone{
  margin-top:20px; padding:18px; border-radius:var(--radius);
  background:linear-gradient(160deg, var(--gold-soft), var(--surface));
  border:1px solid var(--gold); text-align:center;
}
.milestone .star{font-size:1.8rem; color:var(--gold);}
.milestone h3{font-size:1.15rem; margin:6px 0 8px;}
.milestone p{font-size:.88rem; line-height:1.55; text-align:left; opacity:.85;}

/* ---------- Reference tables ---------- */
.ref-table{width:100%; border-collapse:collapse; font-size:.85rem; margin:10px 0;}
.ref-table th{
  text-align:left; font-family:var(--font-ui); font-size:.68rem; text-transform:uppercase;
  letter-spacing:.05em; color:var(--ink); opacity:.5; border-bottom:1px solid var(--rule); padding:6px 6px;
}
.ref-table td{padding:8px 6px; border-bottom:1px solid var(--rule); vertical-align:top;}
.ref-table td.ar{font-family:var(--font-ar); direction:rtl; font-size:1.05rem; color:var(--accent-strong); white-space:normal;}
.table-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch;}

.chip-row{display:flex; flex-wrap:wrap; gap:6px; margin:10px 0;}
.chip{
  background:var(--surface-2); border-radius:20px; padding:6px 12px; font-size:.82rem;
  display:flex; align-items:center; gap:6px;
}
.chip .ar{font-size:1rem; color:var(--accent-strong);}

.empty-state{padding:40px 24px; text-align:center; opacity:.6; font-size:.9rem;}

/* ---------- Install action row ---------- */
.action-row{display:flex; gap:10px; margin:14px 20px 4px;}
.action-btn{
  flex:1; display:flex; align-items:center; justify-content:center; gap:7px;
  background:var(--surface); border:1px solid var(--rule); border-radius:12px;

  color:var(--ink); cursor:pointer;
}
.action-btn .ic{font-size:1rem;}
.action-btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}

/* ---------- Bottom sheet ---------- */
.sheet-overlay{
  position:fixed; inset:0; background:rgba(10,14,20,.5); z-index:40;
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.sheet-overlay.open{opacity:1; pointer-events:auto;}
.sheet{
  width:100%; max-width:560px; background:var(--surface); border-radius:20px 20px 0 0;
  padding:8px 20px calc(env(safe-area-inset-bottom,0px) + 22px);
  transform:translateY(100%); transition:transform .25s ease;
  box-shadow:0 -10px 30px rgba(0,0,0,.2); max-height:80vh; overflow-y:auto;
}
.sheet-overlay.open .sheet{transform:translateY(0);}
.sheet .grabber{width:36px;height:4px;background:var(--rule); border-radius:3px; margin:8px auto 14px;}
.sheet h2{font-size:1.1rem; margin-bottom:4px;}
.sheet .sheet-sub{font-size:.84rem; opacity:.65; margin-bottom:16px;}
.sheet-option{

}
.sheet-option .so-title{font-family:var(--font-ui); font-weight:700; font-size:.88rem; display:flex; align-items:center; gap:8px; margin-bottom:5px;}
.sheet-option p{font-size:.84rem; line-height:1.55; margin:0 0 8px; opacity:.85;}
.sheet-option ol{margin:0 0 8px; padding-left:18px; font-size:.84rem; line-height:1.7; opacity:.9;}
.sheet-btn{
  width:100%; background:var(--accent); color:#fff; border:none; border-radius:10px;
  padding:10px; font-family:var(--font-ui); font-weight:700; font-size:.84rem; cursor:pointer;
}
.sheet-close{
  display:block; width:100%; text-align:center; background:none; border:none;
  color:var(--ink); opacity:.6; font-family:var(--font-ui); font-size:.82rem; padding:10px; cursor:pointer;
}

/* ---------- Toast ---------- */
.toast{
  position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:var(--paper); font-family:var(--font-ui); font-size:.82rem;
  padding:11px 18px; border-radius:30px; z-index:60; opacity:0; pointer-events:none;
  transition:opacity .25s, transform .25s; max-width:88%; text-align:center; box-shadow:var(--shadow);
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ---------- Quran reader ---------- */
.qayah{ transition: background .3s, border-color .3s; }
.qayah.qayah-active{ background: var(--gold-soft); border-color: var(--gold); }
.qplay-btn{
  background: var(--accent-soft); color: var(--accent); border: none; border-radius: 50%;
  width: 36px; height: 36px; flex-shrink: 0; font-size: .95rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.qplay-btn:active{ background: var(--accent); color: #fff; }
.qayah-meaning{
  margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--rule);
}
.qplayer-bar{
  position: fixed; left: 50%; transform: translateX(-50%);
  bottom: 78px; width: 100%; max-width: 560px; z-index: 15;
  background: var(--accent); color: #fff; border-radius: 14px;
  margin: 0 14px; padding: 10px 16px; display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow); width: calc(100% - 28px);
}
.qplayer-toggle{
  background: rgba(255,255,255,.2); border: none; color: #fff; width: 34px; height: 34px;
  border-radius: 50%; font-size: .9rem; cursor: pointer; flex-shrink: 0;
  display:flex; align-items:center; justify-content:center;
}
.qplayer-label{ font-family: var(--font-ui); font-size: .82rem; font-weight: 700; }

/* ---------- Tajweed colors ---------- */
.tj-madd{ color: var(--gold); font-weight: 700; }
.tj-qalqala{ color: var(--rubric); font-weight: 700; }

/* ---------- Bookmark button ---------- */
.qbookmark-btn{
  background: none; border: none; font-size: 1.3rem; color: var(--rule); cursor: pointer;
  flex-shrink: 0; line-height: 1; padding: 4px;
}
.qbookmark-btn.active{ color: var(--gold); }

/* ---------- Hifz (memorization) ---------- */
.hz-word{
  display: inline-block; cursor: pointer; padding: 2px 3px; border-radius: 4px;
  transition: background .15s;
}
.hz-word:active{ background: var(--accent-soft); }
.hz-word.hz-hidden{
  color: transparent; background: var(--surface-2); border-radius: 6px;
  text-shadow: none; user-select: none;
}
.hz-word.hz-hidden::selection{ background: transparent; }

/* ---------- Reduced motion ---------- */
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
}

const LS_KEY = 'qa_progress_v1';

function loadProgress(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)) || {done:{}, exercises:{}}; }
  catch(e){ return {done:{}, exercises:{}}; }
}
function saveProgress(p){ localStorage.setItem(LS_KEY, JSON.stringify(p)); }
let PROGRESS = loadProgress();

let STATE = { view:'home', unitId:null, refSection:'roots' };

/* ================= SPACED REPETITION REVIEW ================= */
// Leitner-style boxes: 0=just missed/new, 5=mastered. Interval before a word is due again.
const SRS_INTERVALS_MS = [10*60*1000, 1*86400000, 3*86400000, 7*86400000, 16*86400000, 35*86400000];
let VOCAB_POOL = null;
function buildVocabPool(){
  if(VOCAB_POOL) return VOCAB_POOL;
  const pool = [];
  UNITS.forEach(u=>{
    (u.vocab.core||[]).forEach((v,i)=>{
      pool.push({key: u.id+'_vc_'+i, unitId:u.id, unitTitle:u.title, ar:v[0], uz:v[1]});
    });
  });
  VOCAB_POOL = pool;
  return pool;
}
function getSrsEntry(key){
  if(!PROGRESS.srs) PROGRESS.srs = {};
  if(!PROGRESS.srs[key]) PROGRESS.srs[key] = {box:0, dueAt:Date.now()};
  return PROGRESS.srs[key];
}
function dueVocab(){
  const now = Date.now();
  return buildVocabPool()
    .filter(p => getSrsEntry(p.key).dueAt <= now)
    .sort((a,b) => getSrsEntry(a.key).dueAt - getSrsEntry(b.key).dueAt);
}
function srsStats(){
  const pool = buildVocabPool();
  const boxes = [0,0,0,0,0,0];
  pool.forEach(p => { boxes[getSrsEntry(p.key).box]++; });
  return { total: pool.length, mastered: boxes[5], boxes, due: dueVocab().length };
}
function markSrs(key, gotIt){
  const e = getSrsEntry(key);
  e.box = gotIt ? Math.min(e.box+1, 5) : 0;
  e.dueAt = Date.now() + SRS_INTERVALS_MS[e.box];
  e.lastResult = gotIt;
  saveProgress(PROGRESS);
}

let REVIEW_SESSION = null;

  if(REVIEW_SESSION && REVIEW_SESSION.queue.length){
    return renderReviewCard(m);
  }
  const stats = srsStats();

  let html = `<div class="folio" style="padding-top:14px;">
    <div class="hero" style="margin:-14px -18px 18px; border-radius:0;">
      <span class="kicker">Takrorlash &middot; Spaced Repetition</span>

    </div>`;

  if(stats.total === 0){
    html += `<div class="empty-state">Hali so'zlar yuklanmagan.</div></div>`;
    m.innerHTML = html;
    return;
  }

  html += `<div class="progress-strip" style="position:relative; margin-bottom:16px;">
      <div class="ring" style="--pct:${pct}"></div>
      <div class="ring-label" style="left:34px;">${pct}%</div>
      <div class="txt"><b>${stats.mastered} / ${stats.total} so'z mustahkamlangan</b>Boshqa ${stats.total-stats.mastered} tasi hali yo'lda</div>

  if(stats.due > 0){
    html += `<div class="milestone" style="text-align:center; border-color:var(--jade); background:linear-gradient(160deg, var(--jade-soft), var(--surface));">
      <div class="star" style="color:var(--jade);">&#9889;</div>

      <button class="sheet-btn" style="margin-top:10px;" onclick="startReviewSession()">Boshlash &rarr;</button>
    </div>`;
  } else {
    html += `<div class="milestone"><div class="star">&#10003;</div><h3>Hammasi tekshirilgan!</h3>
      <p>Hozircha takrorlashga muhtoj so'z yo'q. Keyinroq qaytib keling — so'zlar o'z vaqtida qaytadi.</p></div>`;
  }

  html += `<div class="section-label" style="margin-top:24px;"><span class="dot">&#9636;</span>Qutilar bo'yicha taqsimot</div>
    <div class="chip-row">
      ${['Yangi','1-bosqich','2-bosqich','3-bosqich','4-bosqich','Mustahkam'].map((label,i)=>
        `<span class="chip">${label}: <b style="margin-left:4px;">${stats.boxes[i]}</b></span>`).join('')}
    </div>
    <p class="small" style="margin-top:10px;">"Bildim" desangiz so'z keyingi qutiga o'tadi va uzoqroq vaqtdan keyin qaytadi. "Bilmadim" desangiz eng boshiga qaytadi va tez orada yana so'raladi.</p>
  </div>`;
  m.innerHTML = html;
}

function startReviewSession(){

}

const QURAN_API = 'https://api.alquran.cloud/v1';
let QURAN_LIST = null;
let QURAN_CACHE = {};
let QPLAYER = { audioEl:null, surahNum:null, idx:0, playing:false, singleMode:false };

function ensureAudioEl(){
  if(!QPLAYER.audioEl){
    QPLAYER.audioEl = new Audio();
    QPLAYER.audioEl.preload = 'auto';
    QPLAYER.audioEl.addEventListener('ended', quranNext);
    setupMediaSession();
  }
  return QPLAYER.audioEl;
}

function setupMediaSession(){
  if(!('mediaSession' in navigator)) return;
  navigator.mediaSession.setActionHandler('play', ()=>{ ensureAudioEl().play().catch(()=>{}); QPLAYER.playing=true; renderQuranPlayer(); });
  navigator.mediaSession.setActionHandler('pause', ()=>{ ensureAudioEl().pause(); QPLAYER.playing=false; renderQuranPlayer(); });
  navigator.mediaSession.setActionHandler('nexttrack', ()=> quranNext());
  navigator.mediaSession.setActionHandler('previoustrack', ()=>{
    if(QPLAYER.idx > 0){ QPLAYER.idx--; playCurrentAyah(); }
  });
}
function updateMediaMetadata(){
  if(!('mediaSession' in navigator)) return;
  const cached = QURAN_CACHE[QPLAYER.surahNum];
  if(!cached) return;
  try{
    navigator.mediaSession.metadata = new MediaMetadata({
      title: `${cached.englishName} — ${QPLAYER.idx+1}-oyat`,
      artist: 'Mishary Rashid Alafasy',
      album: "Arabix — Qur'on",
    });
    navigator.mediaSession.playbackState = 'playing';
  }catch(e){}
}

async function fetchQuranList(){
  if(QURAN_LIST) return QURAN_LIST;
  try{
    const cached = localStorage.getItem('qa_quran_list_v1');
    if(cached){ QURAN_LIST = JSON.parse(cached); return QURAN_LIST; }
  }catch(e){}
  const res = await fetch(`${QURAN_API}/surah`);
  const json = await res.json();
  QURAN_LIST = json.data;
  try{ localStorage.setItem('qa_quran_list_v1', JSON.stringify(QURAN_LIST)); }catch(e){}
  return QURAN_LIST;
}

const BISMILLAH_PREFIX = 'بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ '.normalize('NFC');
function stripBismillah(data){
  // The API bakes the Bismillah into ayah[0].text for every surah except
  // Al-Fatiha (where it IS ayah 1) and At-Tawbah (which has none).
  // Arabic combining diacritics can arrive in different (but visually identical)
  // orders across entries, so both sides are NFC-normalized before comparing.
  if(data.number === 1 || data.number === 9) return data;
  const first = data.ayahs[0];
  if(!first) return data;
  const normalized = first.text.normalize('NFC');
  if(normalized.startsWith(BISMILLAH_PREFIX)){
    data.bismillah = BISMILLAH_PREFIX.trim();
    first.text = normalized.slice(BISMILLAH_PREFIX.length);
  }
  return data;
}

async function fetchSurah(num){
  if(QURAN_CACHE[num]) return QURAN_CACHE[num];
  const [arRes, uzRes] = await Promise.all([
    fetch(`${QURAN_API}/surah/${num}/ar.alafasy`),
    fetch(`${QURAN_API}/surah/${num}/uz.sodik`).catch(()=>null)
  ]);
  const arJson = await arRes.json();
  const data = arJson.data;
  try{
    if(uzRes){
      const uzJson = await uzRes.json();
      data.ayahs.forEach((a,i)=>{ a.uz = uzJson.data.ayahs[i] ? uzJson.data.ayahs[i].text : ''; });
      // Uzbek translation also bakes Bismillah into ayah 1's meaning text
      if(data.number !== 1 && data.number !== 9 && data.ayahs[0] && data.ayahs[0].uz){
        const uzBismillahMatch = data.ayahs[0].uz.match(/^[^.]*?[Бб]исмиллах[^)]*\)\s*/);
        if(uzBismillahMatch) data.ayahs[0].uz = data.ayahs[0].uz.slice(uzBismillahMatch[0].length);
      }
    }
  }catch(e){}
  stripBismillah(data);
  QURAN_CACHE[num] = data;
  return data;
}

/* ---- Tajweed color-coding (simplified: madd + qalqala, matching Unit 1) ---- */
function isDiacritic(c){
  if(!c) return false;
  const code = c.charCodeAt(0);
  return (code >= 0x064B && code <= 0x0652) || code === 0x0670;
}
function tajweedHighlight(text){
  const qalqalaLetters = 'قطبجد';
  const chars = Array.from(text);
  let out = '';
  for(let i=0;i<chars.length;i++){
    const c = chars[i], next = chars[i+1];
    if(qalqalaLetters.includes(c) && next === 'ْ'){
      out += `<span class="tj-qalqala">${c}${next}</span>`; i++; continue;
    }
    if(c === 'ا' || c === 'ٰ' || c === 'ٓ' || c === 'آ' || c === 'ى'){
      out += `<span class="tj-madd">${c}</span>`; continue;
    }
    if((c === 'و' || c === 'ي') && !isDiacritic(next)){
      out += `<span class="tj-madd">${c}</span>`; continue;
    }
    out += c;
  }
  return out;
}

/* ---- Cross-linking curriculum units <-> full reader ---- */
function unitForSurah(apiNum){

/* ================= HIFZ (MEMORIZATION) ================= */
function hifzKey(num, idx){ return num+'_'+idx; }
function getHifzEntry(num, idx){
  if(!PROGRESS.hifz) PROGRESS.hifz = {};
  const k = hifzKey(num, idx);
  if(!PROGRESS.hifz[k]) PROGRESS.hifz[k] = {reps:0, writeReps:0, status:'new', lastPracticed:null};
  return PROGRESS.hifz[k];
}
function hifzStats(){
  const entries = Object.entries(PROGRESS.hifz||{});
  const bySurah = {};
  entries.forEach(([k,e])=>{
    const num = k.split('_')[0];
    if(!bySurah[num]) bySurah[num] = {total:0, memorized:0};
    bySurah[num].total++;
    if(e.status==='memorized') bySurah[num].memorized++;
  });
  return {
    total: entries.length,
    memorized: entries.filter(([,e])=>e.status==='memorized').length,
    learning: entries.filter(([,e])=>e.status==='learning').length,
    bySurah
  };
}
function stripArabicDiacritics(s){
  return (s||'').replace(/[\u064B-\u0652\u0670\u0640\u0671]/g,'ا').replace(/[\u0622\u0623\u0625]/g,'ا').replace(/\s+/g,' ').trim();
}
function similarityPct(a,b){
  a = stripArabicDiacritics(a); b = stripArabicDiacritics(b);
  if(!a.length) return 0;
  const bChars = b.split('');
  let matches = 0;
  for(const ch of a.split('')){ const idx = bChars.indexOf(ch); if(idx>-1){ matches++; bChars.splice(idx,1); } }
  return Math.round((matches/a.length)*100);
}

  html += `<div class="section-label" style="margin-top:20px;"><span class="dot">&#128214;</span>Sura tanlang</div>
    <input type="text" placeholder="Sura nomi yoki raqami..." value="${STATE.hifzSearch||''}"
      oninput="STATE.hifzSearch=this.value; renderHifzListItems();"
      style="width:calc(100% - 32px);margin:0 16px 12px;display:block;padding:11px 14px;border-radius:12px;border:1px solid var(--rule);background:var(--surface);font-family:var(--font-body);font-size:.92rem;" />
    <div id="hifzListItems" class="unit-list"></div>
  </div>`;
  m.innerHTML = html;

  if(!QURAN_LIST){
    document.getElementById('hifzListItems').innerHTML = `<div class="empty-state">Yuklanmoqda&hellip;</div>`;
    fetchQuranList().then(()=>{ if(STATE.view==='hifz') renderHifzListItems(); });
  } else {
    renderHifzListItems();
  }
}

function renderHifzListItems(){
  const wrap = document.getElementById('hifzListItems');
  if(!wrap || !QURAN_LIST) return;
  const q = (STATE.hifzSearch||'').trim().toLowerCase();
  const filtered = QURAN_LIST.filter(s =>
    !q || s.englishName.toLowerCase().includes(q) || String(s.number)===q || s.name.includes(q)).slice(0, 30);
  wrap.innerHTML = filtered.map(s => `
    <button class="unit-row" onclick="openHifzRangePicker(${s.number}, '${s.englishName.replace(/'/g,"\\'")}', ${s.numberOfAyahs})">
      <span class="num">${s.number}</span>
      <span class="meta"><span class="t">${s.englishName}</span><span class="s">${s.name} &middot; ${s.numberOfAyahs} oyat</span></span>
      <span class="chev">&#8250;</span>
    </button>`).join('') || `<div class="empty-state">Sura topilmadi.</div>`;
}

function openHifzRangePicker(num, name, total){
  let ov = document.getElementById('sheetOverlay');
  if(!ov){ ov = document.createElement('div'); ov.id='sheetOverlay'; ov.className='sheet-overlay'; document.body.appendChild(ov); ov.onclick=(e)=>{ if(e.target===ov) closeInstallSheet(); }; }
  ov.innerHTML = `<div class="sheet">
    <div class="grabber"></div>
    <h2>${name}ni yodlash</h2>
    <div class="sheet-sub">Qaysi oyatlardan boshlaymiz?</div>
    <div class="sheet-option">
      <div style="display:flex; gap:10px; align-items:center; margin-bottom:12px;">
        <input type="number" id="hzFrom" min="1" max="${total}" value="1" style="flex:1;padding:9px;border-radius:8px;border:1px solid var(--rule);background:var(--paper);text-align:center;">
        <span class="small">dan</span>
        <input type="number" id="hzTo" min="1" max="${total}" value="${Math.min(5,total)}" style="flex:1;padding:9px;border-radius:8px;border:1px solid var(--rule);background:var(--paper);text-align:center;">
        <span class="small">gacha</span>
      </div>
      <p class="small">Kichik bo'lakdan boshlash tavsiya etiladi &mdash; 3&ndash;5 oyat bir seansda.</p>
      <button class="sheet-btn" onclick="startHifzSessionFromPicker(${num}, '${name.replace(/'/g,"\\'")}')">Boshlash</button>
    </div>
    <button class="sheet-close" onclick="closeInstallSheet()">Yopish</button>
  </div>`;
  requestAnimationFrame(()=> ov.classList.add('open'));
}
function startHifzSessionFromPicker(num, name){
  const from = Math.max(1, parseInt(document.getElementById('hzFrom').value)||1) - 1;
  const to = Math.max(from, parseInt(document.getElementById('hzTo').value)-1||from);
  closeInstallSheet();
  startHifzSession(num, from, to, name);
}

function startHifzSession(num, from, to, name){
  STATE.hifzSurah = num; STATE.hifzFrom = from; STATE.hifzTo = to; STATE.hifzIdx = from; STATE.hifzMode = 'view'; STATE.hifzHidden = [];
  PROGRESS.lastHifz = {surahNum:num, from, to, surahName: name || (QURAN_LIST||[]).find(s=>s.number===num)?.englishName || ''};
  saveProgress(PROGRESS);
  go('hifzSession');
}

function renderHifzSession(m){
  const num = STATE.hifzSurah;
  const cached = QURAN_CACHE[num];
  if(!cached){
    m.innerHTML = `<div class="empty-state">Yuklanmoqda&hellip;</div>`;
    fetchSurah(num).then(()=>{ if(STATE.view==='hifzSession') render(); });
    return;
  }
  const idx = STATE.hifzIdx;
  const ayah = cached.ayahs[idx];
  const entry = getHifzEntry(num, idx);
  const total = STATE.hifzTo - STATE.hifzFrom + 1;
  const posInRange = idx - STATE.hifzFrom + 1;
  const mode = STATE.hifzMode || 'view';

  let html = `<div class="folio" style="padding-top:14px; padding-bottom:20px;">
    <div class="ex-kicker">${cached.englishName} &middot; oyat ${posInRange}/${total} (${ayah.numberInSurah}-oyat)</div>
    <div class="chip-row" style="margin:10px 0;">
      ${['view','hide','write','test'].map(mm=>{
        const labels = {view:'&#128065; Ko\'rish', hide:'&#128065;&#8205;&#128215; Yashirish', write:'&#9999;&#65039; Yozish', test:'&#127919; Sinov'};
        return `<span class="chip" style="cursor:pointer;${mode===mm?'background:var(--accent);color:#fff;':''}" onclick="STATE.hifzMode='${mm}'; STATE.hifzHidden=[]; render();">${labels[mm]}</span>`;
      }).join('')}
    </div>

    <div class="surah-card" style="min-height:140px; display:flex; flex-direction:column; justify-content:center; padding:20px 16px;">`;

  if(mode === 'view'){
    html += `<div class="ayah" style="margin:0; text-align:center;">${ayah.text}</div>
      <button class="qplay-btn" style="margin:14px auto 0;" onclick="playSingleAyah(${num},${idx})">&#9658;</button>`;
  }
  if(mode === 'hide'){
    const words = ayah.text.split(' ');
    html += `<div class="ayah" style="margin:0; text-align:center; line-height:2.4;">
      ${words.map((w,i)=>`<span class="hz-word ${((STATE.hifzHidden||[]).includes(i))?'hz-hidden':''}" onclick="toggleWordHide(${i})">${w}</span>`).join(' ')}
    </div>
    <div style="display:flex; gap:8px; justify-content:center; margin-top:14px;">
      <button class="action-btn" onclick="hideAllWords(${words.length})">Hammasini yashirish</button>
      <button class="action-btn" onclick="STATE.hifzHidden=[]; render();">Hammasini ko'rsatish</button>
    </div>`;
  }
  if(mode === 'write'){
    html += `<div class="small" style="text-align:center; margin-bottom:10px;">Oyatni ko'rib, xotirangizdan yozing. Har yozganingizda hisoblanadi.</div>
      <div class="ayah" style="margin:0 0 12px; text-align:center; opacity:.5; font-size:1.1rem;">${ayah.text}</div>
      <textarea id="hzWriteInput" dir="rtl" placeholder="Shu yerga yozing..." style="width:100%;min-height:70px;padding:12px;border-radius:10px;border:1px solid var(--rule);background:var(--paper);font-family:var(--font-ar);font-size:1.2rem;"></textarea>
      <div id="hzWriteFeedback" class="small" style="margin-top:8px; text-align:center;"></div>
      <button class="reveal-btn" style="margin:10px auto 0; display:block;" onclick="checkHifzWrite(${num},${idx})">Tekshirish (${entry.writeReps} marta yozildi)</button>`;
  }
  if(mode === 'test'){
    html += `<div class="small" style="text-align:center; margin-bottom:10px;">Yodingizdan ayting, keyin tekshiring.</div>
      <div id="hzTestArea" style="text-align:center;">
        <button class="reveal-btn" onclick="document.getElementById('hzTestArea').innerHTML=\`<div class='ayah' style='margin:0;'>${ayah.text.replace(/'/g,"\\'")}</div>\`;">Oyatni ko'rsatish</button>
      </div>`;
  }

  html += `</div>`;

  html += `<div class="self-check" style="margin-top:14px;">
    <button class="miss" onclick="markHifzStatus(${num},${idx},'learning')" style="${entry.status==='learning'?'background:var(--gold-soft);border-color:var(--gold);':''}">Jarayonda</button>
    <button class="got" onclick="markHifzStatus(${num},${idx},'memorized')" style="${entry.status==='memorized'?'background:var(--jade-soft);border-color:var(--jade);':''}">Yodladim &#10003;</button>
  </div>

  <div class="unit-nav">
    <button ${posInRange<=1?'disabled':''} onclick="hifzNav(-1)">&#8592; Oldingi</button>
    <button class="primary" ${posInRange>=total?'disabled':''} onclick="hifzNav(1)">Keyingi &#8594;</button>
  </div>
  <p class="small" style="text-align:center; margin-top:14px;">Bu oyatni ${entry.reps} marta ko'rib chiqdingiz.</p>
  </div>`;

  m.innerHTML = html;
  entry.reps++; entry.lastPracticed = Date.now(); saveProgress(PROGRESS);
}

function toggleWordHide(i){
  if(!STATE.hifzHidden) STATE.hifzHidden = [];
  const pos = STATE.hifzHidden.indexOf(i);
  if(pos>-1) STATE.hifzHidden.splice(pos,1); else STATE.hifzHidden.push(i);
  render();
}
function hideAllWords(count){
  STATE.hifzHidden = Array.from({length:count}, (_,i)=>i);
  render();
}
function checkHifzWrite(num, idx){
  const cached = QURAN_CACHE[num];
  const written = document.getElementById('hzWriteInput').value;
  const pct = similarityPct(cached.ayahs[idx].text, written);
  const entry = getHifzEntry(num, idx);
  entry.writeReps++;
  saveProgress(PROGRESS);
  const fb = document.getElementById('hzWriteFeedback');
  let msg, color;
  if(pct >= 85){ msg = `&#10003; Ajoyib! ${pct}% mos keldi.`; color='var(--jade)'; }
  else if(pct >= 50){ msg = `Yaqin — ${pct}% mos keldi. Yana urinib ko'ring.`; color='var(--gold)'; }
  else { msg = `${pct}% mos keldi. Oyatga qayta qarab, yana yozing.`; color='var(--rubric)'; }
  fb.innerHTML = `<span style="color:${color}; font-weight:700;">${msg}</span>`;
  document.getElementById('hzWriteInput').value = '';
  setTimeout(()=>{ const btn=document.querySelector('.reveal-btn'); if(btn) btn.textContent = `Tekshirish (${entry.writeReps} marta yozildi)`; }, 10);
}
function markHifzStatus(num, idx, status){
  const entry = getHifzEntry(num, idx);
  entry.status = status;
  saveProgress(PROGRESS);
  render();
}
function hifzNav(dir){
  const next = STATE.hifzIdx + dir;
  if(next < STATE.hifzFrom || next > STATE.hifzTo) return;
  STATE.hifzIdx = next; STATE.hifzMode='view'; STATE.hifzHidden=[];
  render();
}

/* ================= PLATFORM ================= */
function isNativeApp(){ return !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()); }

/* ================= THEME ================= */
function initTheme(){
  const saved = localStorage.getItem(LS_THEME);
  if(saved){ document.documentElement.setAttribute('data-theme', saved); }
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const curEffective = cur || (sysDark ? 'dark':'light');
  const next = curEffective === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(LS_THEME, next);
  renderTopbar();
}

/* ================= HELPERS ================= */
function pctDone(){
  const total = UNITS.length;
  const done = Object.keys(PROGRESS.done).filter(k=>PROGRESS.done[k]).length;
  return Math.round((done/total)*100);
}
function isDone(id){ return !!PROGRESS.done[id]; }
function markDone(id, val){ PROGRESS.done[id] = val; saveProgress(PROGRESS); }
function exKey(unitId, idx){ return unitId+'_'+idx; }
function setExResult(unitId, idx, correct){
  PROGRESS.exercises[exKey(unitId,idx)] = correct;
  saveProgress(PROGRESS);
}

function go(view, opts){
  STATE.view = view;
  if(opts && opts.unitId !== undefined) STATE.unitId = opts.unitId;
  if(opts && opts.refSection !== undefined) STATE.refSection = opts.refSection;
  if(opts && opts.surahNum !== undefined) STATE.surahNum = opts.surahNum;
  window.scrollTo(0,0);
  render();
}

/* ================= RENDER: SHELL ================= */
function render(){
  renderTopbar();
  renderMain();
  renderTabbar();
}

function renderTopbar(){
  const bar = document.getElementById('topbar');
  const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const cur = document.documentElement.getAttribute('data-theme') || (sysDark?'dark':'light');
  const icon = cur === 'dark' ? '☀' : '☽';
  if(STATE.view === 'home'){
    bar.innerHTML = `<div style="flex:1"></div><button class="theme-toggle" onclick="toggleTheme()" aria-label="Mavzu">${icon}</button>`;
    return;
  }
  let title = '';
  if(STATE.view === 'unit'){ const u = UNITS[STATE.unitId-1]; title = `${u.id}-dars`; }
  if(STATE.view === 'progress'){ title = "Mundarija"; }
  if(STATE.view === 'reference'){ title = "Qo'llanma"; }
  if(STATE.view === 'review'){ title = "Takrorlash"; }
  if(STATE.view === 'quran'){ title = "Qur'on"; }
  if(STATE.view === 'quranSurah'){ const c = QURAN_CACHE[STATE.surahNum]; title = c ? c.englishName : "Qur'on"; }
  if(STATE.view === 'hifz'){ title = "Yodlash"; }
  if(STATE.view === 'hifzSession'){ title = "Yodlash"; }
  const backToQuranList = STATE.view === 'quranSurah';
  const backToHifzHome = STATE.view === 'hifzSession';
  const backAction = (STATE.view === 'review' && REVIEW_SESSION) ? "REVIEW_SESSION=null; go('review')" : (backToQuranList ? "go('quran')" : backToHifzHome ? "go('hifz')" : "go('home')");
  bar.innerHTML = `
    <button class="back-btn" onclick="${backAction}" aria-label="Orqaga">&#8592;</button>
    <h1>${title}</h1>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Mavzu">${icon}</button>
  `;
}

function renderTabbar(){
  const tb = document.getElementById('tabbar');
  const tabs = [
    {id:'home', ic:'\u{1F4D6}', label:'Suralar'},
    {id:'quran', ic:'\u{1F319}', label:"Qur'on"},
    {id:'hifz', ic:'\u{1F9E0}', label:'Yodlash'},
    {id:'review', ic:'⚡', label:'Takrorlash'},
    {id:'progress', ic:'✦', label:'Progress'},
    {id:'reference', ic:'☷', label:"Qo'llanma"},
  ];
  tb.innerHTML = tabs.map(t=>{
    const active = (STATE.view===t.id) || (t.id==='home' && STATE.view==='unit') || (t.id==='quran' && STATE.view==='quranSurah') || (t.id==='hifz' && STATE.view==='hifzSession');
    const dueBadge = (t.id==='review' && srsStats().due>0) ? `<span style="position:absolute;top:2px;right:14px;width:8px;height:8px;border-radius:50%;background:var(--rubric);"></span>` : '';
    return `<button class="tab ${active?'active':''}" style="position:relative;" onclick="${t.id==='review'?'REVIEW_SESSION=null;':''}go('${t.id}')">${dueBadge}<span class="ic">${t.ic}</span>${t.label}</button>`;
  }).join('');
}

/* ================= RENDER: MAIN ROUTER ================= */
function renderMain(){
  const m = document.getElementById('main');
  if(STATE.view === 'home') return renderHome(m);
  if(STATE.view === 'unit') return renderUnit(m, STATE.unitId);
  if(STATE.view === 'progress') return renderProgress(m);
  if(STATE.view === 'reference') return renderReference(m);
  if(STATE.view === 'review') return renderReview(m);
  if(STATE.view === 'quran') { renderQuranPlayer(); return renderQuran(m); }
  if(STATE.view === 'quranSurah') return renderQuranSurah(m, STATE.surahNum);
  if(STATE.view === 'hifz') { renderQuranPlayer(); return renderHifz(m); }
  if(STATE.view === 'hifzSession') { renderQuranPlayer(); return renderHifzSession(m); }
}

/* ================= HOME ================= */
function renderHome(m){
  const pct = pctDone();
  const doneCount = Object.keys(PROGRESS.done).filter(k=>PROGRESS.done[k]).length;
  let html = `
  <div class="hero">
    <span class="kicker">Qur'oniy Arabcha &middot; 1-Kitob &middot; Poydevor va Naqshlar</span>
    <h1>Arabix</h1>
    <div class="ar-line">العربية القرآنية</div>
    <p>Nol darajadan — Qur'onni o'zingiz o'qib tushunishgacha. Atamalarsiz, ma'no orqali, har bir darsda haqiqiy oyatlar bilan.</p>
  </div>
  <div class="progress-strip" style="position:relative; cursor:pointer;" onclick="go('progress')">
    <div class="ring" style="--pct:${pct}"></div>
    <div class="ring-label" style="left:34px;">${pct}%</div>
    <div class="txt"><b>${doneCount} / ${UNITS.length} dars</b>Taraqqiyotingizni ko'rish uchun bosing &rarr;</div>
  </div>
  ${isNativeApp() ? '' : `<div class="action-row">
    <button class="action-btn primary" onclick="openInstallSheet()"><span class="ic">&#11015;</span>Ilovani o'rnatish</button>
  </div>`}`;

  let lastPhase = -1;
  UNITS.forEach(u=>{
    if(u.phase !== lastPhase){
      lastPhase = u.phase;
      const ph = PHASES[u.phase];
      html += `<div class="phase-label">${ph.label} <span class="sub">&middot; ${ph.name}</span></div><div class="unit-list">`;
      if(u.id !== 1) html = html; // list wrapper opened per phase below
    }
    const d = isDone(u.id);
    html += `
      <button class="unit-row ${d?'done':''}" onclick="go('unit',{unitId:${u.id}})">
        <span class="num">${d?'':u.id}</span>
        <span class="meta">
          <span class="t">${u.title}</span>
          ${u.ar ? `<span class="s">${u.ar}</span>` : ''}
        </span>
        <span class="chev">&#8250;</span>
      </button>`;
    const isPhaseEnd = (u.id===1 || u.id===10 || u.id===20);
    if(isPhaseEnd) html += `</div>`;
  });
  m.innerHTML = html;
}

/* ================= PROGRESS VIEW ================= */
function renderProgress(m){
  const pct = pctDone();
  const doneCount = Object.keys(PROGRESS.done).filter(k=>PROGRESS.done[k]).length;
  let html = `
    <div class="folio">
      <div class="progress-strip" style="position:relative; margin:0 0 18px;">
        <div class="ring" style="--pct:${pct}"></div>
        <div class="ring-label" style="left:34px;">${pct}%</div>
        <div class="txt"><b>${doneCount} / ${UNITS.length} dars tugallandi</b>Har darsni oxirigacha o'qib, "Tugatdim" tugmasini bosing.</div>
      </div>`;
  let lastPhase = -1;
  UNITS.forEach(u=>{
    if(u.phase!==lastPhase){ lastPhase=u.phase; html += `<div class="phase-label">${PHASES[u.phase].label} &middot; ${PHASES[u.phase].name}</div>`; }
    const d = isDone(u.id);
    html += `<div class="unit-row ${d?'done':''}" onclick="go('unit',{unitId:${u.id}})" style="cursor:pointer;">
      <span class="num">${d?'':u.id}</span>
      <span class="meta"><span class="t">${u.title}</span></span>
      <span class="chev">&#8250;</span>
    </div>`;
  });
  html += `</div>`;
  m.innerHTML = html;
}

/* ================= UNIT READER ================= */
function renderUnit(m, id){
  const u = UNITS[id-1];
  let html = `<div class="folio">
    <div class="unit-hero">
      <span class="badge">${PHASES[u.phase].label} &middot; Dars ${u.id}</span>
      <h1>${u.title}</h1>
      ${u.ar ? `<span class="ar">${u.ar}</span>` : ''}
    </div>
    <div class="section-label"><span class="dot">A</span>Kirish</div>
    <div class="prose"><p>${u.intro}</p></div>`;

  if(u.ayahs && u.ayahs.length){
    html += `<div class="section-label"><span class="dot">B</span>Avval — butun surani ko'ring</div>
      <div class="surah-card">${u.ayahs.map((a,i)=>`<div class="ayah">${a} <span class="n">${arNum(i+1)}</span></div>`).join('')}</div>`;
    if(u.wbwIntro) html += `<p class="prose" style="font-size:.88rem;opacity:.75;">${u.wbwIntro}</p>`;
    if(u.surahApiNum){
      html += `<div class="chip-row">
        <span class="chip" style="cursor:pointer;" onclick="go('quranSurah',{surahNum:${u.surahApiNum}})">&#127760; To'liq Qur'onda o'qish/tinglash</span>
        <span class="chip" style="cursor:pointer;" onclick="fetchQuranList().then(()=>{const s=QURAN_LIST.find(x=>x.number===${u.surahApiNum}); openHifzRangePicker(${u.surahApiNum}, s?s.englishName:'', ${u.ayahs.length});})">&#129504; Bu surani yodlash</span>
      </div>`;
    }
  }
  if(u.examples && u.examples.length){
    html += `<div class="section-label"><span class="dot">B</span>Yig'ilgan misollar</div>
      <div class="chip-row">${u.examples.map(e=>`<span class="chip"><span class="ar">${e}</span></span>`).join('')}</div>`;
    if(u.examplesNote) html += `<p class="prose" style="font-size:.88rem;opacity:.75;">${u.examplesNote}</p>`;
  }

  if(u.wbw && u.wbw.length){
    html += `<div class="section-label"><span class="dot">C</span>Oyatma-oyat, so'zma-so'z</div><div>`;
    u.wbw.forEach(w=>{
      html += `<div class="wbw-block">
        <div class="wbw-ref">${w.ref}</div>
        <div class="wbw-ar">${w.ar}</div>
        <div class="wbw-meaning">"${w.meaning}"</div>
        ${w.notes ? `<div class="prose" style="font-size:.88rem;">${w.notes}</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  if(u.blocks){
    u.blocks.forEach(b=>{
      html += `<div class="card qoida"><div class="card-title"><span class="ic">Q</span>${b.h}</div>${b.p.map(p=>`<p>${p}</p>`).join('')}</div>`;
    });
  }

  if(u.table){
    const hasAr = s => /[؀-ۿ]/.test(String(s));
    html += `<div class="section-label"><span class="dot">&#9636;</span>${u.table.title}</div>
    <div class="table-wrap"><table class="ref-table"><tr>${u.table.cols.map(c=>`<th>${c}</th>`).join('')}</tr>
    ${u.table.rows.map(r=>`<tr>${r.map((c)=>`<td class="${hasAr(c)?'ar':''}">${c}</td>`).join('')}</tr>`).join('')}
    </table></div>`;
  }

  if(u.synth){
    html += `<div class="section-label"><span class="dot">D</span>Naqshni birlashtiring</div><div class="prose"><p>${u.synth}</p></div>`;
  }
  if(u.tafakkur){
    html += `<div class="card tafakkur"><div class="card-title"><span class="ic">T</span>Tafakkur</div><p>${u.tafakkur}</p></div>`;
  }
  if(u.talaffuz){
    html += `<div class="card talaffuz"><div class="card-title"><span class="ic">&#9835;</span>Talaffuz</div><p>${u.talaffuz}</p></div>`;
  }

  if((u.vocab && (u.vocab.core.length||u.vocab.recognition.length))){
    html += `<div class="section-label"><span class="dot">S</span>So'zlar &middot; bos, ma'nosini ko'r</div><div class="vocab-grid">`;
    u.vocab.core.forEach((v,i)=>{ html += vocabCard(v,'core',id+'_c'+i); });
    u.vocab.recognition.forEach((v,i)=>{ html += vocabCard(v,'rec',id+'_r'+i); });
    html += `</div>`;
  }

  html += `<div class="section-label"><span class="dot">&#9998;</span>Mashqlar</div><div id="exwrap"></div>`;

  if(u.milestone){
    html += `<div class="milestone"><div class="star">&#9733;</div><h3>Tabriklaymiz — 1-kitob yakunlandi</h3>
    <p>${u.closing}</p></div>`;
  } else {
    html += `<div class="prose" style="margin-top:16px;"><p><b>${u.closing || ''}</b></p></div>`;
  }

  html += `<label style="display:flex;align-items:center;gap:10px;margin-top:20px;padding:14px;background:var(--surface);border:1px solid var(--rule);border-radius:12px;cursor:pointer;">
      <input type="checkbox" id="donecheck" style="width:20px;height:20px;accent-color:var(--jade);" ${isDone(u.id)?'checked':''} onchange="markDone(${u.id}, this.checked); go('unit',{unitId:${u.id}});">
      <span style="font-family:var(--font-ui);font-weight:700;font-size:.88rem;">Bu darsni tugatdim</span>
    </label>`;

  html += `<div class="unit-nav">
    <button ${id<=1?'disabled':''} onclick="go('unit',{unitId:${id-1}})">&#8592; Oldingi</button>
    <button class="primary" ${id>=UNITS.length?'disabled':''} onclick="go('unit',{unitId:${id+1}})">Keyingi &#8594;</button>
  </div>`;

  html += `</div>`;
  m.innerHTML = html;

  // render exercises interactively
  const exwrap = document.getElementById('exwrap');
  u.exercises.forEach((ex,i)=> exwrap.appendChild(buildExercise(ex, u.id, i)));
}

function arNum(n){
  const digits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
  return String(n).split('').map(d=>digits[+d]).join('');
}

function vocabCard(v, tag, key){
  return `<div class="vocab-card ${tag}" onclick="this.classList.toggle('flipped')">
    <span class="tag">${tag==='core'?'YODLASH':'TANISH'}</span>
    <div class="ar">${v[0]}</div>
    <div class="uz">${v[1]}</div>
  </div>`;
}

/* ================= EXERCISES ================= */
function buildExercise(ex, unitId, idx){
  const wrap = document.createElement('div');
  wrap.className = 'ex-card';
  if(ex.type === 'mcq') return buildMCQ(ex, unitId, idx, wrap);
  if(ex.type === 'reveal') return buildReveal(ex, unitId, idx, wrap);
  if(ex.type === 'match') return buildMatch(ex, unitId, idx, wrap);
  return wrap;
}

function buildMCQ(ex, unitId, idx, wrap){
  wrap.innerHTML = `<div class="ex-kicker">${ex.kicker}</div><div class="ex-q">${ex.q}</div><div class="ex-options"></div><div class="ex-feedback-slot"></div>`;
  const optWrap = wrap.querySelector('.ex-options');
  let answered = false;
  ex.options.forEach((opt,i)=>{
    const b = document.createElement('button');
    b.className = 'ex-opt';
    b.innerHTML = /[؀-ۿ]/.test(opt) ? `<span class="ar">${opt}</span>` : opt;
    b.onclick = ()=>{
      if(answered) return;
      answered = true;
      const correct = i === ex.correct;
      b.classList.add(correct ? 'correct' : 'wrong');
      optWrap.querySelectorAll('.ex-opt').forEach(o=>o.classList.add('disabled'));
      if(!correct) optWrap.children[ex.correct].classList.add('correct');
      const fb = wrap.querySelector('.ex-feedback-slot');
      fb.innerHTML = `<div class="ex-feedback ${correct?'ok':'no'}">${correct?'&#10003; To\'g\'ri! ':'&#10007; '}${ex.explain||''}</div>`;
      setExResult(unitId, idx, correct);
    };
    optWrap.appendChild(b);
  });
  return wrap;
}

function buildReveal(ex, unitId, idx, wrap){
  wrap.innerHTML = `<div class="ex-kicker">${ex.kicker}</div><div class="ex-q">${ex.prompt}</div>
    <button class="reveal-btn">Javobni ko'rsatish</button>
    <div class="reveal-slot"></div>`;
  const btn = wrap.querySelector('.reveal-btn');
  btn.onclick = ()=>{
    wrap.querySelector('.reveal-slot').innerHTML = `
      <div class="reveal-answer">${ex.answer}</div>
      <div class="self-check">
        <button class="got">To'g'ri topdim</button>
        <button class="miss">Adashdim</button>
      </div>`;
    btn.remove();
    wrap.querySelector('.got').onclick = (e)=>{
      wrap.querySelectorAll('.self-check button').forEach(x=>x.classList.remove('picked'));
      e.target.classList.add('picked');
      setExResult(unitId, idx, true);
    };
    wrap.querySelector('.miss').onclick = (e)=>{
      wrap.querySelectorAll('.self-check button').forEach(x=>x.classList.remove('picked'));
      e.target.classList.add('picked');
      setExResult(unitId, idx, false);
    };
  };
  return wrap;
}

function buildMatch(ex, unitId, idx, wrap){
  const pairs = ex.pairs;
  const rightShuffled = pairs.map((p,i)=>({txt:p.r, i})).sort(()=>Math.random()-0.5);
  wrap.innerHTML = `<div class="ex-kicker">MASHQ &middot; Moslang</div>
    <div class="match-row">
      <div class="match-col" id="mcol-l"></div>
      <div class="match-col" id="mcol-r"></div>
    </div>
    <div class="ex-feedback-slot"></div>`;
  const lcol = wrap.querySelector('#mcol-l');
  const rcol = wrap.querySelector('#mcol-r');
  let selL = null, matchedCount = 0;
  pairs.forEach((p,i)=>{
    const item = document.createElement('div');
    item.className = 'match-item';
    item.innerHTML = `<span class="ar">${p.l}</span>`;
    item.dataset.i = i;
    item.onclick = ()=>{
      if(item.classList.contains('matched')) return;
      lcol.querySelectorAll('.match-item').forEach(x=>x.classList.remove('sel'));
      item.classList.add('sel');
      selL = i;
    };
    lcol.appendChild(item);
  });
  rightShuffled.forEach(rp=>{
    const item = document.createElement('div');
    item.className = 'match-item';
    item.textContent = rp.txt;
    item.dataset.i = rp.i;
    item.onclick = ()=>{
      if(item.classList.contains('matched') || selL === null) return;
      if(selL === rp.i){
        item.classList.add('matched');
        lcol.querySelector(`.match-item[data-i="${selL}"]`).classList.add('matched');
        matchedCount++;
        if(matchedCount === pairs.length){
          wrap.querySelector('.ex-feedback-slot').innerHTML = `<div class="ex-feedback ok">&#10003; Barchasi to'g'ri moslashtirildi!</div>`;
          setExResult(unitId, idx, true);
        }
      } else {
        item.classList.add('shake');
        const lEl = lcol.querySelector(`.match-item[data-i="${selL}"]`);
        lEl.classList.add('shake');
        setTimeout(()=>{ item.classList.remove('shake'); lEl.classList.remove('shake'); lEl.classList.remove('sel'); }, 350);
      }
      selL = null;
    };
    rcol.appendChild(item);
  });
  return wrap;
}

/* ================= REFERENCE VIEW ================= */
function renderReference(m){

  const tabs = [
    {id:'roots', label:'Ildizlar'}, {id:'sozlik', label:"So'zlik"},
    {id:'quickref', label:'Tezkor'}, {id:'review', label:'Takrorlash'}

  let html = `<div class="folio" style="padding-top:12px;">
    <div class="chip-row" style="margin-bottom:4px;">

  if(sec === 'roots'){
    html += `<div class="table-wrap"><table class="ref-table"><tr><th>Ildiz</th><th>Ma'no</th><th>So'zlar</th><th>Dars</th></tr>
      ${ROOT_INDEX.map(r=>`<tr><td class="ar">${r.root}</td><td>${r.meaning}</td><td class="ar">${r.words}</td><td>${r.units}</td></tr>`).join('')}
    </table></div>`;
  }

      ${SOZLIK.map(s=>`<tr><td>${s.u}</td><td class="ar">${s.ar}</td><td>${s.uz}</td><td><span style="font-size:.68rem;font-weight:700;color:${s.tag==='core'?'var(--rubric)':'var(--ink)'};opacity:${s.tag==='core'?1:.5}">${s.tag==='core'?'Y':'T'}</span></td></tr>`).join('')}

    QUICK_REF.forEach(q=>{
      html += `<div class="card qoida"><div class="card-title"><span class="ic">Q</span>${q.title}</div>
      <div class="table-wrap"><table class="ref-table">${q.rows.map(r=>`<tr><td class="${hasArabic(r[0])?'ar':''}">${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</table></div></div>`;
    });
  }
  if(sec === 'review'){

    </table></div>`;
  }
  html += `</div>`;
  m.innerHTML = html;
}

/* ================= APP ICON (canvas-generated, for Add to Home Screen) ================= */
function generateAppIcon(size){
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const r = size*0.22;
  ctx.fillStyle = '#173a5c';
  roundRect(ctx, 0, 0, size, size, r); ctx.fill();
  const grad = ctx.createLinearGradient(0,0,size,size);
  grad.addColorStop(0, '#2a5d8f'); grad.addColorStop(1, '#173a5c');
  ctx.fillStyle = grad;
  roundRect(ctx, 0, 0, size, size, r); ctx.fill();
  ctx.strokeStyle = '#c9962f'; ctx.lineWidth = size*0.02;
  roundRect(ctx, size*0.04, size*0.04, size*0.92, size*0.92, r*0.85); ctx.stroke();
  ctx.fillStyle = '#d9ac5c';
  ctx.font = `${size*0.52}px "Naskh Quran", serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('ع', size*0.5, size*0.58);
  return c.toDataURL('image/png');
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function setupIconLinks(){
  const draw = ()=>{
    const icon192 = generateAppIcon(192);
    const icon180 = generateAppIcon(180);
    let apple = document.querySelector('link[rel="apple-touch-icon"]');
    if(!apple){ apple = document.createElement('link'); apple.rel='apple-touch-icon'; document.head.appendChild(apple); }
    apple.href = icon180;
    let fav = document.querySelector('link[rel="icon"]');
    if(!fav){ fav = document.createElement('link'); fav.rel='icon'; document.head.appendChild(fav); }
    fav.href = icon192;
    const manifest = {
      name: "Arabix — Qur'oniy Arabcha, 1-kitob", short_name: "Arabix",
      start_url: ".", display: "standalone", background_color: "#f6f1e3", theme_color: "#24507a",
      icons: [{src: icon192, sizes:"192x192", type:"image/png"}]
    };
    let man = document.querySelector('link[rel="manifest"]');
    if(!man){ man = document.createElement('link'); man.rel='manifest'; document.head.appendChild(man); }
    man.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
    let meta = document.querySelector('meta[name="apple-mobile-web-app-capable"]');
    if(!meta){ meta = document.createElement('meta'); meta.name='apple-mobile-web-app-capable'; meta.content='yes'; document.head.appendChild(meta); }
    let tc = document.querySelector('meta[name="theme-color"]');
    if(!tc){ tc = document.createElement('meta'); tc.name='theme-color'; tc.content='#24507a'; document.head.appendChild(tc); }
  };
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(draw).catch(draw); }
  else draw();
}

/* ================= TOAST ================= */
let toastTimer = null;
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){ t = document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 3200);
}

/* ================= INSTALL SHEET ================= */
function isIOS(){ return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1); }

function openInstallSheet(){
  let ov = document.getElementById('sheetOverlay');
  if(!ov){ ov = document.createElement('div'); ov.id='sheetOverlay'; ov.className='sheet-overlay'; document.body.appendChild(ov); ov.onclick = (e)=>{ if(e.target===ov) closeInstallSheet(); }; }
  const ios = isIOS();
  ov.innerHTML = `<div class="sheet">
    <div class="grabber"></div>
    <h2>Ilovani telefoningizga qo'shish</h2>
    <div class="sheet-sub">Ikki yo'l bor — birini tanlang.</div>

    <div class="sheet-option">
      <div class="so-title">&#127968; Bosh ekranga qo'shish (tavsiya etiladi)</div>
      <p>Ilova xuddi oddiy ilova kabi belgichaga ega bo'lib, offline holatda ham ochiladi.</p>
      ${ios ? `
        <ol><li>Pastdagi <b>Ulashish</b> &#8593; tugmasini bosing</li><li>"<b>Bosh ekranga qo'shish</b>" ni tanlang</li><li>"<b>Qo'shish</b>" ni bosing</li></ol>
      ` : `
        <ol><li>Yuqori/pastdagi menyu (&#8942;) tugmasini bosing</li><li>"<b>Bosh ekranga qo'shish</b>" yoki "<b>Ilovani o'rnatish</b>" ni tanlang</li></ol>
      `}
    </div>

    <div class="sheet-option">
      <div class="so-title">&#11015; Fayl sifatida yuklab olish</div>
      <p>Butun ilovani bitta HTML fayl sifatida telefoningizga saqlaydi — keyin uni istalgan brauzerda oching.</p>
      <button class="sheet-btn" onclick="downloadApp()">Yuklab olish</button>
    </div>

    <button class="sheet-close" onclick="closeInstallSheet()">Yopish</button>
  </div>`;
  requestAnimationFrame(()=> ov.classList.add('open'));
}
function closeInstallSheet(){
  const ov = document.getElementById('sheetOverlay');
  if(ov) ov.classList.remove('open');
}

async function downloadApp(){
  if(!window.claude || !window.claude.downloads){
    showToast("Yuklab olish bu ko'rinishda mavjud emas — \"Bosh ekranga qo'shish\"dan foydalaning.");
    return;
  }
  try{
    const html = '<!doctype html>\n' + document.documentElement.outerHTML;
    await window.claude.downloads.save({ filename: "quroniy-arabcha-1-kitob.html", data: html });
    showToast("Saqlandi! Endi uni istalgan brauzerda ochishingiz mumkin.");
    closeInstallSheet();
  }catch(err){
    const code = err && err.code;
    let msg = "Yuklab olishda xatolik yuz berdi.";
    if(code === 'declined') msg = "Yuklab olish bekor qilindi.";
    else if(code === 'extension_not_enabled' || code === 'rejected_extension') msg = "Bu ko'rinishda fayl yuklab olish yoqilmagan — \"Bosh ekranga qo'shish\"dan foydalaning.";
    else if(code === 'rate_limited') msg = "Biroz kuting, so'ng qayta urinib ko'ring.";
    else if(code === 'too_large') msg = "Fayl hajmi juda katta.";
    showToast(msg);
  }
}

initTheme();
setupIconLinks();
render();
